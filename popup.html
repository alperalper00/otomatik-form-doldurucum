<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface2: #1c1c22;
      --border: #2a2a32;
      --accent: #7c6aff;
      --accent2: #ff6a6a;
      --accent3: #6affc8;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --green: #00e676;
      --red: #ff4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 0;
      overflow-y: auto;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 14px 10px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      background: radial-gradient(circle, rgba(124,106,255,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .header-title .dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .header-sub {
      color: var(--muted);
      font-size: 9px;
      margin-top: 2px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-cell {
      background: var(--surface);
      padding: 10px 8px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
    }
    .stat-cell:nth-child(2) .stat-num { color: var(--accent2); }
    .stat-cell:nth-child(3) .stat-num { color: var(--accent3); }
    .stat-label {
      color: var(--muted);
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 3px;
    }

    .content {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field label {
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    
    select, input[type="number"], input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 7px 9px;
      border-radius: 5px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }
    input[type="text"] { cursor: text; }
    select:focus, input:focus {
      border-color: var(--accent);
    }
    select option {
      background: #1c1c22;
    }

    .delay-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .delay-badge {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent3);
      background: rgba(106,255,200,0.08);
      border: 1px solid rgba(106,255,200,0.2);
      padding: 1px 7px;
      border-radius: 20px;
      min-width: 52px;
      text-align: center;
    }
    .slider-wrap {
      position: relative;
      height: 20px;
      display: flex;
      align-items: center;
    }
    .slider-track {
      position: absolute;
      left: 0; right: 0;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .slider-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      border-radius: 2px;
      transition: width 0.1s;
    }
    input[type="range"] {
      position: relative;
      z-index: 2;
      width: 100%;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      height: 20px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(124,106,255,0.6);
      border: 2px solid var(--bg);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--accent3);
      box-shadow: 0 0 10px rgba(106,255,200,0.6);
    }

    .log-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      height: 90px;
      overflow-y: auto;
      padding: 5px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .log-box::-webkit-scrollbar { width: 4px; }
    .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .log-item {
      font-size: 9px;
      padding: 4px 6px;
      border-radius: 4px;
      background: var(--surface);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 2px solid var(--muted);
    }
    .log-item.ok { border-left-color: var(--green); }
    .log-item.err { border-left-color: var(--red); }
    .log-item.info { border-left-color: var(--accent); }
    .log-time { color: var(--muted); font-size: 8px; font-weight: bold; }
    .log-msg { color: var(--text); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2px 0;
    }

    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 5px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.15s, transform 0.1s;
      text-transform: uppercase;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover { opacity: 0.85; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-reset { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 9px; padding: 5px; }
    .btn-reset:hover { border-color: var(--red); color: var(--red); opacity: 1; }

    .btn-row { display: flex; flex-direction: column; gap: 5px; }

    .status-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 6px 14px;
      font-size: 9px;
      color: var(--muted);
      text-align: center;
      min-height: 22px;
      letter-spacing: 0.3px;
    }
    .status-bar.ok { color: var(--green); }
    .status-bar.err { color: var(--red); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">
      <span class="dot"></span>
      FORM BOT
    </div>
    <div class="header-sub">Kontrol Paneli</div>
  </div>

  <div class="stats">
    <div class="stat-cell">
      <div class="stat-num" id="statToplam">0</div>
      <div class="stat-label">Toplam</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num" id="statErkek">0</div>
      <div class="stat-label">Erkek</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num" id="statKadin">0</div>
      <div class="stat-label">Kadın</div>
    </div>
  </div>

  <div class="content">

    <div class="field">
      <button class="btn" id="toggleBotBtn" style="font-size: 11px; padding: 10px; margin-bottom: 5px; transition: 0.3s;"></button>
    </div>

    <div class="field">
      <label>İşlem Geçmişi</label>
      <div class="log-box" id="logBox"></div>
    </div>
    <hr class="divider">

    <div class="field">
      <label>Hedef Form Linki</label>
      <input type="text" id="hedefLinkInput" placeholder="https://docs.google.com/forms/...">
    </div>

    <div class="field">
      <label>Metin/Yanıt - Form Sonunda Sorulan Kutucuk </label>
      <input type="text" id="varsayilanMetin" placeholder="Kısa yanıt veya paragraf metni...">
    </div>

    <div class="field">
      <label>Genel Şık Seçimi</label>
      <select id="sikSecimi">
        <option value="random">🎲 Rastgele Şık Seç</option>
        <option value="1">1. Şık</option>
        <option value="2">2. Şık</option>
        <option value="3">3. Şık</option>
        <option value="4">4. Şık</option>
        <option value="5">5. Şık</option>
      </select>
    </div>

    <div class="field">
      <label>Cinsiyet</label>
      <select id="cinsiyetSecimi">
        <option value="random">🎲 Rastgele Cinsiyet</option>
        <option value="erkek">Erkek</option>
        <option value="kadin">Kadın</option>
      </select>
    </div>

    <hr class="divider">

    <div class="field">
      <div class="delay-row">
        <label>Gecikme Süresi</label>
        <span class="delay-badge" id="delayBadge">500 ms</span>
      </div>
      <div class="slider-wrap">
        <div class="slider-track">
          <div class="slider-fill" id="sliderFill" style="width:16.6%"></div>
        </div>
        <input type="range" id="delaySlider" min="200" max="3000" step="100" value="500">
      </div>
    </div>

    <hr class="divider">

    <div class="field">
      <label>Hedef Gönderim Sayısı (Max 50)</label>
      <input type="number" id="hedefAdetInput" value="10" min="1" max="50">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="kaydetBtn">AYARLARI UYGULA</button>
      <button class="btn btn-reset" id="sifirlaBtn">Tüm Verileri Sıfırla</button>
    </div>

  </div>

  <div class="status-bar" id="durumMetni">Hazır</div>

  <script src="popup.js"></script>
</body>
</html>
